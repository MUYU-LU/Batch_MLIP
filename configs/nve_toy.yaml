schema_version: 1
task: nve
input: data/demo.extxyz
output: runs/nve_toy/final.extxyz

runtime:
  device: cpu
  dtype: float64
  skin: 1.0

model:
  factory: atombit_batch.toy_models:build_quadratic_model
  kwargs:
    k: 1.0
  cutoff: 4.0
  force_mode: autograd

md:
  timestep_fs: 0.05
  n_steps: 1000
  initialize_velocities: true
  initial_temperature_K: 300.0
  initialization_seed: 1234
  remove_initial_com: true
  force_exact_initial_temperature: true
  callback_interval: 20

reporting:
  trajectory: runs/nve_toy/trajectory.extxyz
  diagnostics: runs/nve_toy/diagnostics.jsonl
  summary: runs/nve_toy/summary.json
