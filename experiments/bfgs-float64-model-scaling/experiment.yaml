name: bfgs-float64-model-scaling
hypothesis: >-
  Casting the float32 AtomBit checkpoint and all model inputs to float64 can be
  compared fairly with common ASE when both BFGS/Frechet paths also use
  float64 and the deterministic controls and fixed samples are unchanged.
precision:
  checkpoint_and_model: float64
  graph_state_forces_stress: float64
  bfgs_coordinates_hessian_eigensolve: float64
controls:
  deterministic_algorithms: true
  cublas_workspace_config: ":4096:8"
  cpu_threads_per_worker: 1
  repeats: 3
  pool_size: 32
  atom_counts: [46, 92, 184, 276]
  batch_sizes: [1, 2, 4, 8, 16, 32]
  fmax_eV_per_A: 0.05
  max_steps: 500
  max_step_A: 0.2
  alpha_eV_per_A2: 70.0
  cutoff_A: 6.0
result: >-
  Float64 active B32 is 4.62-5.80x faster than float64 common ASE. Relative
  to the mixed model it costs 6.1-18.7% more time per graph evaluation and
  1.96-1.98x peak memory at B32.
