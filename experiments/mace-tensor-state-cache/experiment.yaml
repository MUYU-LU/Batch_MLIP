id: mace-tensor-state-cache
date: 2026-07-19
baseline_commit: df4475561468b26f48ea7bec5d2517d141c84959
hypothesis: >-
  Projecting persistent AseGraphBatch tensors directly into MACE and reusing a
  skin candidate graph removes repeated ASE Config, AtomicData, DataLoader, and
  host-to-device construction enough to improve variable-cell BFGS throughput.
model: MACE-OFF-Small
optimizer: BFGS
workload_size: 256
resident_batch_size: 64
repeats: 1
model_dtype: float64
optimizer_dtype: float64
cell_filter: FrechetCellFilter
refill_policy: immediate
cases:
  - atom_count: 46
    modes:
      - graph_mode: rebuild
        skin_A: 0.0
      - graph_mode: cached
        skin_A: 0.5
  - atom_count: 276
    modes:
      - graph_mode: rebuild
        skin_A: 0.0
      - graph_mode: cached
        skin_A: 0.5
correctness_gates:
  - batch_size_one_matches_mace_atomic_data
  - batch_size_two_matches_mace_atomic_data
  - cached_batch_size_one_bfgs_matches_common_ase
  - cached_nve_drift_matches_rebuild_at_five_time_points
  - all_production_jobs_converge
raw_results: runs/mace_tensor_state_cache/
result:
  atom46_time_reduction_percent: 3.2945823470436397
  atom276_time_reduction_percent: 9.702116006938333
  all_converged: true
  atom276_step_mismatches: 83
  cached_mode_retained: true
  cached_mode_automatic_default: false
