id: atombit-smooth-rms-optimizer-frontier
status: complete
baseline_commit: fd29e84
benchmark_commit: 2de22a7
benchmark_runner: benchmarks/benchmark_variable_cell_scaling.py
hardware: NVIDIA H100 80GB HBM3
hypothesis: >-
  The native-fp32 smooth-RMS AtomBit checkpoint has an optimizer- and
  structure-size-dependent throughput frontier. Selecting the resident batch
  separately for FIRE, full BFGS, and BFGSLineSearch will outperform common
  sequential ASE while preserving convergence and initial calculator parity.
checkpoint:
  file: AtomBit-OMC-s_smooth_rms_fp32_7gpu_epoch5.pt
  sha256: b27c372cb2c2848ae1e54a9ffd7a2aa0b0401d9cc0ed922e3be250ff63e44486
  model_dtype: float32
workload:
  manifest: benchmarks/t2_fixed_samples.json
  source_pool: first 64 frozen samples per atom count
  batch_pool: cyclic repetition of source pool to R256
  ase_pool: R64
  ase_scaling: exact fourfold repetition for the R256 reference
  atom_counts: [46, 92, 184, 276]
optimizers:
  fire:
    ase_class: ase.optimize.FIRE
    batch_method: active
    alpha: null
  bfgs:
    ase_class: ase.optimize.BFGS
    batch_method: refill
    alpha: 70.0
  bfgslinesearch:
    ase_class: ase.optimize.BFGSLineSearch
    batch_method: active
    alpha: 10.0
common:
  variable_cell: true
  cell_filter: FrechetCellFilter
  fmax_eV_per_A: 0.05
  max_steps:
    fire:
      H46: 1000
      H92: 2000
      H184: 2000
      H276: 1000
    bfgs: 500
    bfgslinesearch: 1000
  max_step_A: 0.2
  fire_dt_start: 0.1
  fire_dt_max: 1.0
  skin_A: 0.5
  neighbor_backend: auto
  optimizer_dtype: float64
  deterministic: true
  timing_repeats: 1
initial_frontier:
  H46: [128, 256]
  H92: [128, 256]
  H184: [64, 128]
  H276: [64, 128]
adaptive_search:
  rule: >-
    If the smaller initial batch is more than 2% faster than the larger batch,
    measure one additional batch at half the smaller size. Continue downward
    only while each newly smaller point improves throughput by more than 2%.
  selection: >-
    Select the smallest successful batch within 2% of maximum measured
    throughput and below 85% of total GPU memory.
correctness_gates:
  - all 256 jobs converge
  - no NaN or overflow
  - selected point stays below the memory safety threshold
  - convergence flags are compared with the matching ASE optimizer
  - endpoint energy, force, stress, position, and cell differences are reported
  - endpoint identity is descriptive rather than required on a nonconvex landscape
metrics:
  - wall_seconds
  - systems_per_second
  - speedup_vs_exact_repeat_ase
  - peak_gpu_memory
  - peak_gpu_reserved_memory
  - model_evaluations
  - graph_evaluations
  - neighbor_rebuilds
  - optimizer_steps_total
  - convergence_count
  - endpoint_diagnostics
limitations:
  - one timing observation per screening point
  - FIRE and BFGSLineSearch use active-drain because refill is not implemented
  - BFGS screens refill first and falls back to active-drain when reserve is unsafe
outcome:
  hypothesis: supported_with_optimizer_specific_convergence_and_memory_limits
  fastest_optimizer:
    H46: bfgs
    H92: bfgs
    H184: bfgs
    H276: fire
  fire_H184: no_valid_frontier_at_2000_steps
artifacts:
  raw_archive: /tmp/smooth_rms_optimizer_frontier_raw_final.tgz
  raw_archive_sha256: 42b7806acc21dca0592a3c82979cb0ba988d42b945d434ae20670f1d447693a8
