id: atombit-line-search-precision
hypothesis: >-
  End-to-end float64 AtomBit evaluation prevents the excessive strong-Wolfe
  trial loop observed with the float32 H46 workload.
baseline_commit: 483fb0c
hardware: NVIDIA H100 80GB GPU
stage_1:
  workload: Aven12_1_367_z1.cif
  atom_count: 46
  pool_size: 1
  methods: [ase, active]
  model_dtypes: [float32, float64]
stage_2:
  condition: float64 B1 completes without excessive line-search trials
  workload: frozen H46 R32 pool
  pool_size: 32
  methods: [ase, active_b32]
  model_dtype: float64
common:
  optimizer: bfgslinesearch
  optimizer_dtype: float64
  variable_cell: true
  fmax_eV_per_A: 0.05
  max_steps: 500
  alpha: 10.0
  max_step_A: 0.2
  skin_A: 0.5
  deterministic: true
  repeats: 1
metrics:
  - completion_status
  - wall_seconds
  - model_evaluations
  - optimizer_steps_total
  - convergence_count
  - endpoint_difference
  - peak_gpu_memory
directional_derivative_diagnostic:
  geometries: [initial, stalled_float64_active_b1]
  directions: [atomic, cell, combined]
  model_dtypes: [float32, float64]
  neighbor_modes: [cached, rebuilt]
  finite_difference: central
  purpose: >-
    Test whether energy derivatives agree with autograd force and stress, and
    whether neighbor rebuilding creates directional discontinuities.
line_profile_diagnostic:
  trace_dtype: float64
  profile_dtypes: [float32, float64]
  selected_directions: [initial, first_high_trial, stalled]
  observables:
    - actual_trial_steps
    - energy_profile
    - directional_derivative
    - armijo_condition
    - strong_wolfe_curvature_condition
    - physical_edge_count
  purpose: >-
    Directly show the one-dimensional AtomBit curves encountered by the real
    BFGSLineSearch trajectory without using MACE as a causal comparison.
degree_counterfactual:
  dtype: float64
  controls:
    - same_geometry_edge_present_vs_removed
    - same_geometry_fixed_degree_normalization
  purpose: >-
    Prove whether hard neighbor-count degree normalization, rather than an
    unrelated topology-dependent operation, causes the measured energy jump.
cross_structure_cutoff_probe:
  atom_counts: [46, 92, 184, 276]
  samples_per_size: 3
  sample_count: 12
  selection: benchmarks/t2_fixed_samples.json
  dtype: float64
  construction: >-
    Apply the minimum uniform strain that places the nearest physical edge
    immediately inside 6 A, then compare edge-present and edge-removed graphs
    at identical geometry with and without fixed degree normalization.
