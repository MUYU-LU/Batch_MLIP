name: variable-cell-compaction
date: 2026-07-17
hypothesis: >-
  Selecting graph state and every bound Frechet optimizer tensor with the same
  active-system mapping will preserve masked variable-cell trajectories while
  eliminating model work for converged systems.
mechanism: >-
  Compact generalized atomic coordinates, reference cells, log deformation,
  cell factors, pressure, cell velocity, FIRE state, and graph tensors, then
  scatter cells, energies, forces, and stresses back to original order.
source_packet:
  path: atombit_batch_lab_packet.zip
  sha256: f8366816dadc7b1c764bf51065be16c0cdc6f3abf6c0699687d6c7c0ba25731d
environment: /public/home/lmy/.conda/envs/lmy
commands:
  baseline: >-
    python -m pytest -q tests/test_variable_cell.py tests/test_relaxation.py
  targeted: python -m pytest -q tests/test_variable_cell.py
  production: >-
    CUDA_VISIBLE_DEVICES=0 python benchmarks/validate_variable_cell_production.py --device cuda:0
  lint: >-
    python -m ruff check atombit_batch tests benchmarks/validate_variable_cell_production.py
  final: python -m pytest -q
correctness_gates:
  - Callback-level masked and active positions, cells, energy, force, stress, and convergence agree.
  - Per-system pressure and cell-factor state remain aligned after selection.
  - Original graph and atom ordering is restored in results and callbacks.
  - Production AtomBit compacts one fixed T2 sample while another cell continues.
  - Existing fixed-cell compaction and ASE variable-cell references still pass.
performance_expectation: >-
  Graph evaluations decrease according to the active batch size, but no wall-time
  speed claim is made until a production convergence-distribution benchmark.
