name: variable-cell-fire
date: 2026-07-17
hypothesis: >-
  Optional batched log-deformation cell coordinates can reproduce individual
  ASE FrechetCellFilter plus FIRE results without changing fixed-cell FIRE.
mechanism: >-
  Add three scaled 3-vectors per graph, map stress to the exact Frechet
  log-strain force, and include atomic and cell coordinates in per-system FIRE
  power, norm, mixing, and displacement operations.
source_packet:
  path: atombit_batch_lab_packet.zip
  sha256: f8366816dadc7b1c764bf51065be16c0cdc6f3abf6c0699687d6c7c0ba25731d
environment: /public/home/lmy/.conda/envs/lmy
commands:
  baseline: python -m pytest -q
  targeted: python -m pytest -q tests/test_variable_cell.py
  lint: python -m ruff check atombit_batch tests
  final: python -m pytest -q
  production: >-
    python benchmarks/validate_variable_cell_production.py --device cuda:0
correctness_gates:
  - Native graph stress agrees with central finite differences for all 3x3 strain parameters.
  - Hydrostatic heterogeneous-batch Frechet FIRE agrees with individual ASE runs.
  - Anisotropic Frechet FIRE agrees with ASE in steps, cell, positions, energy, and stress.
  - Positive compressive pressure in GPa agrees with ASE E+pV cell forces.
  - Existing fixed-cell active-compaction regressions remain unchanged.
performance_expectation: >-
  Correctness experiment only. Cell changes force CPU neighbor-list rebuilds at
  every model evaluation, so no acceleration claim is made.
